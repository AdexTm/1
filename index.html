<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIP Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; text-align: center; margin: 0; }
        .header { background: #2d2d2d; padding: 15px; position: sticky; top: 0; z-index: 10; }
        input { padding: 8px; width: 350px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #gallery { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px; }
        img { max-width: 95%; height: auto; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="linkInput" placeholder="Вставьте ссылку на ZIP (Dropbox/Direct)">
        <button onclick="processLink()">Открыть</button>
    </div>

    <div id="status" style="margin-top: 20px;"></div>
    <div id="gallery"></div>

    <script>
        async function loadZip(url) {
            const gallery = document.getElementById('gallery');
            const status = document.getElementById('status');
            
            // Превращаем ссылку Dropbox в прямую для скачивания
            let directUrl = url.replace('dl=0', 'dl=1').replace('www.dropbox.com', 'dl.dropboxusercontent.com');

            gallery.innerHTML = '';
            status.innerText = 'Загрузка...';

            try {
                const response = await fetch(directUrl);
                if (!response.ok) throw new Error('Не удалось скачать файл. Проверьте ссылку.');
                
                const blob = await response.blob();
                const zip = await JSZip.loadAsync(blob);
                const promises = [];

                zip.forEach((path, entry) => {
                    if (!entry.dir && /\.(jpe?g|png|webp)$/i.test(path)) {
                        promises.push(entry.async("blob").then(data => ({ name: path, blob: data })));
                    }
                });

                const images = await Promise.all(promises);
                images.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));

                status.innerText = '';
                images.forEach(imgData => {
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(imgData.blob);
                    gallery.appendChild(img);
                });

                // Сохраняем ссылку в URL страницы для пересылки другу
                const newUrl = window.location.origin + window.location.pathname + '?url=' + encodeURIComponent(url);
                window.history.pushState({}, '', newUrl);

            } catch (e) {
                status.innerText = 'Ошибка: ' + e.message;
            }
        }

        function processLink() {
            const val = document.getElementById('linkInput').value;
            if (val) loadZip(val);
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const urlParam = params.get('url');
            if (urlParam) {
                document.getElementById('linkInput').value = urlParam;
                loadZip(urlParam);
            }
        };
    </script>
</body>
</html>
