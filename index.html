<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Просмотрщик фото</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f0f0; }
        #gallery { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px; }
        img { max-width: 90%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .loader { margin-top: 50px; font-size: 20px; color: #666; }
    </style>
</head>
<body>

    <div id="status" class="loader">Загрузка фотографий...</div>
    <div id="gallery"></div>

    <script>
        // ЗАМЕНИ ЭТОТ ID на ID своего файла с Google Диска
        const fileId = 'ID_ТВОЕГО_ФАЙЛА'; 
        // Прямая ссылка на скачивание через прокси (чтобы обойти защиту Google)
        const url = `https://corsproxy.io/?https://drive.google.com/uc?export=download&id=${fileId}`;

        async function loadZip() {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const zip = await JSZip.loadAsync(blob);
                const gallery = document.getElementById('gallery');
                const images = [];

                // Извлекаем файлы
                const promises = [];
                zip.forEach((path, entry) => {
                    if (!entry.dir && /\.(jpe?g|png)$/i.test(path)) {
                        promises.push(entry.async("blob").then(content => ({
                            name: path,
                            blob: content
                        })));
                    }
                });

                const results = await Promise.all(promises);
                // Сортировка 001, 002...
                results.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));

                document.getElementById('status').style.display = 'none';

                results.forEach(imgData => {
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(imgData.blob);
                    gallery.appendChild(img);
                });

            } catch (e) {
                document.getElementById('status').innerText = 'Ошибка загрузки. Проверьте доступ к файлу.';
                console.error(e);
            }
        }

        loadZip();
    </script>
</body>
</html>
